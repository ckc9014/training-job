apiVersion: batch/v1
kind: Job
metadata:
  name: training-job
  namespace: training        
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: training-job
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule


      nodeSelector:
        karpenter.sh/capacity-type: spot

      containers:
      - name: trainer
        image: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.eu-west-1.amazonaws.com/training-repo:latest
        imagePullPolicy: Always

        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1

        env:
        - name: MODEL_BUCKET
          value: "<YOUR_BUCKET_NAME>"   
        - name: EPOCHS
          value: "15"

      restartPolicy: Never